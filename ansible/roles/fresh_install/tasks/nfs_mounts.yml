---
# NFS mount setup for media shares

- name: Install NFS client packages
  ansible.builtin.apt:
    name:
      - nfs-common
    state: present
    update_cache: yes
  when: install_nfs_mounts | default(false) | bool

- name: Create media mount point
  ansible.builtin.file:
    path: /mnt/media
    state: directory
    owner: "{{ default_puid }}"
    group: "{{ default_pgid }}"
    mode: '0755'
  when: install_nfs_mounts | default(false) | bool

- name: Mount NFS media share
  ansible.posix.mount:
    path: /mnt/media
    src: "{{ nfs_media_server }}:{{ nfs_media_path }}"
    fstype: nfs
    opts: "rw,soft,intr,timeo=30,retrans=3,nfsvers=4,x-systemd.requires=network-online.target,x-systemd.after=network-online.target,_netdev,auto,nofail"
    state: mounted
    boot: true
  when: install_nfs_mounts | default(false) | bool

- name: Verify NFS media share is accessible
  ansible.builtin.command: ls /mnt/media
  register: nfs_check
  changed_when: false
  failed_when: nfs_check.rc != 0
  when: install_nfs_mounts | default(false) | bool

- name: Ensure media library directories exist on NFS
  ansible.builtin.file:
    path: "/mnt/media/{{ item }}"
    state: directory
    owner: "{{ media_puid | default(default_puid) }}"
    group: "{{ media_pgid | default(default_pgid) }}"
    mode: '0775'
  loop:
    - tv
    - movies
    - downloads
    - downloads/completed
    - downloads/completed/sonarr
    - downloads/completed/radarr
  when: install_nfs_mounts | default(false) | bool

- name: Create /mnt/nfs directory for legacy symlink
  ansible.builtin.file:
    path: /mnt/nfs
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: install_nfs_mounts | default(false) | bool

- name: Check legacy /mnt/nfs/media path
  ansible.builtin.stat:
    path: /mnt/nfs/media
    follow: false
  register: nfs_legacy_media
  when: install_nfs_mounts | default(false) | bool

- name: Unmount stale legacy NFS mount if necessary
  ansible.builtin.command: umount -l /mnt/nfs/media
  changed_when: false
  failed_when: false
  when:
    - install_nfs_mounts | default(false) | bool
    - nfs_legacy_media.stat.exists | default(false)
    - not nfs_legacy_media.stat.islnk | default(false)

- name: Create /mnt/nfs/media symlink to /mnt/media (force)
  ansible.builtin.file:
    src: /mnt/media
    dest: /mnt/nfs/media
    state: link
    force: yes
  when: install_nfs_mounts | default(false) | bool
