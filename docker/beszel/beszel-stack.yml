# NOTE: Docker stack deploy uses v3.x schema; 3.9 is the last version.
#       The 'version' field is deprecated for compose v2, but kept here for Swarm clarity.
#! ANSIBLE DEPENDENCY: ansible/roles/fresh_install/tasks/app_data_setup.yml
#! - Creates /mnt/cephfs/docker-shared-data/beszel/data directory (owner: 1000:1000)

version: "3.9"

services:
  agent:
    image: henrygd/beszel-agent:latest
    environment:
      - TZ=${TZ}
      - LISTEN=45876
      - "KEY=${BESZEL_AGENT_KEY}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/host:ro
    ports:
      - target: 45876
        published: 45876
        protocol: tcp
        mode: host
    logging:
      driver: json-file
      options:
        max-size: "12m"
        max-file: "5"
    deploy:
      mode: global
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M

networks:
  proxy:
    external: true
