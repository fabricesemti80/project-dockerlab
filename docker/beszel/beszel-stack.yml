# NOTE: Docker stack deploy uses v3.x schema; 3.9 is the last version.
#       The 'version' field is deprecated for compose v2, but kept here for Swarm clarity.
#! ANSIBLE DEPENDENCY: ansible/roles/fresh_install/tasks/app_data_setup.yml
#! - Creates /mnt/cephfs/docker-shared-data/beszel/data directory (owner: 1000:1000)

version: "3.9"

services:
  hub:
    image: henrygd/beszel:latest
    user: "1000:1000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      - TZ=${TZ}
      - AGENT_TIMEOUT=30
      - "BESZEL_SSH_PRIVATE=${BESZEL_SSH_PRIVATE}"
      - "BESZEL_SSH_PUBLIC=${BESZEL_SSH_PUBLIC}"
    volumes:
      - /mnt/cephfs/docker-shared-data/beszel/data:/beszel_data
    command: >
      sh -c "
        echo \"$$BESZEL_SSH_PRIVATE\" > /beszel_data/id_ed25519 &&
        echo \"$$BESZEL_SSH_PUBLIC\" > /beszel_data/id_ed25519.pub &&
        chown 1000:1000 /beszel_data/id_ed25519* &&
        chmod 600 /beszel_data/id_ed25519 &&
        chmod 644 /beszel_data/id_ed25519.pub &&
        beszel
      "
    networks:
      - proxy
    logging:
      driver: json-file
      options:
        max-size: "12m"
        max-file: "5"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 512M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.beszel.rule=Host(`beszel.${DOMAIN}`)"
        - "traefik.http.routers.beszel.entrypoints=websecure"
        - "traefik.http.routers.beszel.tls.certresolver=cloudflare"
        - "traefik.http.services.beszel.loadbalancer.server.port=8090"

        # Homepage Discovery
        - "homepage.group=Monitoring"
        - "homepage.name=Beszel"
        - "homepage.icon=beszel.png"
        - "homepage.href=https://beszel.${DOMAIN}"
        - "homepage.description=Resource Monitor"
        # - "homepage.widget.type=beszel"
        # - "homepage.widget.url=https://beszel.${DOMAIN}"

  agent:
    image: henrygd/beszel-agent:latest
    environment:
      - TZ=${TZ}
      - LISTEN=45876
      - "KEY=${BESZEL_SSH_PUBLIC}"
      - "TOKEN=${BESZEL_AGENT_KEY}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/host:ro
    ports:
      - target: 45876
        published: 45876
        protocol: tcp
        mode: host
    logging:
      driver: json-file
      options:
        max-size: "12m"
        max-file: "5"
    deploy:
      mode: global
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M

networks:
  proxy:
    external: true
