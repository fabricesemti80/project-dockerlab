version: "3.9"

services:
  cloudflared:
    image: cloudflare/cloudflared:2026.2.0
    networks:
      - proxy
    environment:
      - TZ=${TZ}
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    command: tunnel --metrics 0.0.0.0:2000 run
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:2000/ready || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      mode: replicated
      replicas: 2
      placement:
        constraints:
          - node.role == manager # Optional: Managers usually have stable outgoing connections
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      rollback_config:
        parallelism: 1
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          memory: 64M

networks:
  proxy:
    external: true
