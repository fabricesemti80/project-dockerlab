radarr:
  movies-1080p:
    base_url: !env_var RADARR_URL
    api_key: !env_var RADARR_API_KEY
    delete_old_custom_formats: true
    quality_definition:
      type: movie
      preferred_ratio: 0.5
      qualities:
        # MB/min caps. 110 MB/min keeps a 3-hour movie below ~20 GB.
        - name: Bluray-1080p
          max: 110
          preferred: 80
        - name: WEBDL-1080p
          max: 110
          preferred: 80
        - name: WEBRip-1080p
          max: 110
          preferred: 80
    quality_profiles:
      - trash_id: d1d67249d3890e49bc12e275d989a7e9 # HD Bluray + WEB
        name: Movies 1080p
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: true
          until_quality: Bluray-1080p
          until_score: 10000
    media_naming:
      folder: plex-tmdb
      movie:
        rename: true
        standard: plex-tmdb

sonarr:
  series-1080p:
    base_url: !env_var SONARR_URL
    api_key: !env_var SONARR_API_KEY
    delete_old_custom_formats: true
    quality_definition:
      type: series
      preferred_ratio: 0.5
      qualities:
        # MB/min caps. 22 MB/min targets about 1 GB for a 45-minute episode.
        - name: Bluray-1080p
          max: 22
          preferred: 18
        - name: WEBDL-1080p
          max: 22
          preferred: 18
        - name: WEBRip-1080p
          max: 22
          preferred: 18
        - name: HDTV-1080p
          max: 22
          preferred: 18
    quality_profiles:
      - trash_id: 72dae194fc92bf828f32cde7744e51a1 # WEB-1080p
        name: Series 1080p
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: true
          until_quality: WEB 1080p
          until_score: 10000
